{{ define "title" }}Giriş Yap - Gotree{{ end }}

{{ define "content" }}
<div class="min-h-screen flex items-center justify-center px-4 py-12 relative overflow-hidden">
    <!-- Ambient Soft Light Blurs -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-neutral-200/40 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-amber-100/30 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-emerald-600/15 border border-emerald-600/25 mb-4 shadow-sm text-emerald-700">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.5 19 2c1 2 2 3.5 1 9.8a7 7 0 0 1-9 8.2Z"></path>
                    <path d="M9 22v-4"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-neutral-900 mb-2">Gotree Girişi</h1>
            <p class="text-neutral-500 text-sm">Yönetim paneline erişmek için giriş yapın.</p>
        </div>

        <!-- Double-Bezel Card Outer Shell -->
        <div class="rounded-3xl bg-white p-1.5 ring-1 ring-neutral-200/80 shadow-[0_10px_30px_rgba(0,0,0,0.02)] border border-[#EAE6DF]">
            <!-- Inner Core -->
            <div class="rounded-[calc(1.5rem-0.375rem)] bg-white p-6 md:p-8">
                
                {{ if .Error }}
                <div class="mb-6 p-4 rounded-xl bg-red-500/5 border border-red-500/10 text-red-600 text-sm flex items-center gap-3">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <span>{{ .Error }}</span>
                </div>
                {{ end }}

                <form action="/login" method="POST" class="space-y-6">
                    <div>
                        <label for="username" class="block text-xs font-bold text-neutral-600 uppercase tracking-wider mb-2">Kullanıcı Adı</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-neutral-400 text-sm">@</span>
                            <input type="text" id="username" name="username" required autocomplete="off" autofocus
                                class="w-full bg-[#FDFBF7] border border-[#EAE6DF] rounded-xl py-3 pl-8 pr-4 text-neutral-900 placeholder-neutral-400 focus:outline-none focus:border-neutral-900 focus:ring-1 focus:ring-neutral-900 transition-all text-sm"
                                placeholder="kullanıcıadı">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-xs font-bold text-neutral-600 uppercase tracking-wider mb-2">Şifre</label>
                        <div class="relative" x-data="{ show: false }">
                            <input :type="show ? 'text' : 'password'" id="password" name="password" required
                                class="w-full bg-[#FDFBF7] border border-[#EAE6DF] rounded-xl py-3 pl-4 pr-10 text-neutral-900 placeholder-neutral-400 focus:outline-none focus:border-neutral-900 focus:ring-1 focus:ring-neutral-900 transition-all text-sm"
                                placeholder="••••••••">
                            
                            <button type="button" @click="show = !show" class="absolute inset-y-0 right-0 pr-3 flex items-center text-neutral-400 hover:text-neutral-700 transition-all cursor-pointer">
                                <template x-if="!show">
                                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </template>
                                <template x-if="show">
                                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                                    </svg>
                                </template>
                            </button>
                        </div>
                    </div>

                    <button type="submit" 
                        class="group relative w-full flex items-center justify-center gap-2 bg-neutral-900 hover:bg-neutral-800 text-white font-semibold py-3.5 px-4 rounded-xl transition-all duration-300 active:scale-[0.98] shadow-sm overflow-hidden cursor-pointer">
                        <span>Giriş Yap</span>
                        <div class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center transition-transform group-hover:translate-x-1">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                            </svg>
                        </div>
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center mt-6 text-xs text-neutral-400">
            Self-hosted minimalist link yönetim sistemi.
        </p>
    </div>
</div>
{{ end }}
